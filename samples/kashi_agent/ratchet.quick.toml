[ratchet]
adapter = "ratchet_adapter:adapter"
evals = "evals.quick.jsonl"
out = "../../results/kashi-agent/quick"
env_file = "../../.env"
dev_budget = 3
holdout_budget = 1
optimizer_model = "gpt-5.4"
optimizer_reasoning = "medium"
samples_per_case = 3
max_case_retries = 1
case_timeout_s = 180
fail_fast = false
