[ratchet]
adapter = "samples.policy_triage_agent.ratchet_adapter:adapter"
evals = "evals.jsonl"
out = "../../results/policy-triage/final"
env_file = "../../.env"
dev_budget = 10
holdout_top_k = 4
harnesser_model = "gpt-5.4"
harnesser_reasoning = "medium"
harnesser_enabled = true
max_case_retries = 2
case_timeout_s = 180
fail_fast = false
