[ratchet]
adapter = "ratchet_adapter:adapter"
evals = "evals.assessment.jsonl"
out = "results/assessment"
env_file = "../../.env"
dev_budget = 6
holdout_budget = 4
holdout_top_k = 1
optimizer_model = "gemini-3-flash-preview"
optimizer_reasoning = "medium"
samples_per_case = 1
case_concurrency = 6
stage_case_concurrency = 6
case_timeout_s = 0
expensive_candidate_cost_ratio = 8.0
max_dev_measurement_cost_usd = 0.20
max_holdout_measurement_cost_usd = 0.12
max_dev_measurement_tool_calls = 600
max_holdout_measurement_tool_calls = 300
max_dev_measurement_turns = 700
max_holdout_measurement_turns = 350

[ratchet.objective]
mode = "correctness"
tie_breakers = ["highest_correctness", "lower_tool_calls", "lower_latency"]

[ratchet.objective.constraints]
allowed_models = [
  "gemini-2.5-flash-lite",
  "gemini-2.5-flash",
  "gemini-2.5-pro",
  "gemini-3-flash-preview",
  "gemini-3-pro-preview",
]
min_correctness_delta = 0.0
max_patch_operations = 4
