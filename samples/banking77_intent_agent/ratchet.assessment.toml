[ratchet]
adapter = "ratchet_adapter:adapter"
evals = "evals.assessment.jsonl"
out = "results/assessment"
env_file = "../../.env"
dev_budget = 16
holdout_budget = 6
optimizer_model = "gemini-3-flash-preview"
optimizer_reasoning = "medium"
samples_per_case = 1
case_concurrency = 16
stage_case_concurrency = 24
case_timeout_s = 90
expensive_candidate_cost_ratio = 10.0
max_dev_measurement_cost_usd = 0.35
max_holdout_measurement_cost_usd = 0.20

[ratchet.objective]
mode = "correctness"
tie_breakers = ["highest_correctness"]

[ratchet.objective.constraints]
allowed_models = [
  "gemini-3.1-flash-lite-preview",
  "gemini-3-flash-preview",
  "gemini-3-pro-preview",
  "gemini-2.5-flash-lite",
  "gemini-2.5-flash",
  "gemini-2.5-pro",
]
min_correctness_delta = 0.0
