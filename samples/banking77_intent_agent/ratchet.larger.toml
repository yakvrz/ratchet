[ratchet]
adapter = "ratchet_adapter:adapter"
evals = "evals.larger.jsonl"
out = "results/larger"
env_file = "../../.env"
dev_budget = 12
holdout_budget = 5
optimizer_model = "gemini-3-flash-preview"
optimizer_reasoning = "medium"
samples_per_case = 1
case_concurrency = 8
case_timeout_s = 90

[ratchet.objective]
mode = "correctness"
tie_breakers = ["highest_correctness"]

[ratchet.objective.constraints]
allowed_edits = ["instruction", "model", "few_shot", "output", "runtime"]
allowed_models = [
  "gemini-3.1-flash-lite-preview",
  "gemini-3-flash-preview",
  "gemini-3-pro-preview",
  "gemini-2.5-flash-lite",
  "gemini-2.5-flash",
  "gemini-2.5-pro",
]
min_correctness_delta = 0.0
