[ratchet]
adapter = "ratchet_adapter:adapter"
evals = "evals.jsonl"
out = "../../results/python-api-grounding/demo"
env_file = "../../.env"
dev_budget = 6
holdout_budget = 3
optimizer_model = "gemini-2.5-pro"
optimizer_reasoning = "medium"
samples_per_case = 1
max_case_retries = 2
case_timeout_s = 180
fail_fast = false

[ratchet.objective]
mode = "correctness"

[ratchet.objective.constraints]
allowed_edits = ["few_shot", "instruction", "model", "output", "retrieval", "runtime", "tool", "verifier"]
allowed_models = ["gemini-2.5-flash-lite", "gemini-2.5-flash", "gemini-2.5-pro"]
max_cost_ratio = 1.75
max_latency_ratio = 1.5
