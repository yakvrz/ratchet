[ratchet]
adapter = "samples.runbook_action_agent.ratchet_adapter:adapter"
evals = "evals.jsonl"
out = "../../results/runbook-action/final"
env_file = "../../.env"
dev_budget = 12
holdout_budget = 4
optimizer_model = "gpt-5.4"
optimizer_reasoning = "medium"
max_case_retries = 2
case_timeout_s = 180
fail_fast = false
